# Fuzhou Mahjong — Automatic Windows Release Builder
#
# Triggers whenever you push a version tag, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1
#
# What it does:
#   1. Builds FuzhouMahjong.exe on a real Windows runner via PyInstaller
#   2. Zips the output folder into FuzhouMahjong.zip
#   3. Creates a GitHub Release and attaches the zip as a download asset
#
# Players with the app installed will be notified of the new version
# automatically next time they open the launcher.

name: Build & Release (Windows)

on:
  push:
    tags:
      - "v*.*.*"          # triggers on tags like v1.0.0, v1.2.3, etc.

permissions:
  contents: write         # needed to create releases and upload assets

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      # ── 1. Check out the repo ────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies + PyInstaller ────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ── 4. Build the app ─────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller fuzhou_mahjong.spec --noconfirm

      # ── 5. Zip the output folder ─────────────────────────────────────
      - name: Zip release folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FuzhouMahjong -DestinationPath FuzhouMahjong.zip

      # ── 6. Create GitHub Release and upload the zip ──────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fuzhou Mahjong ${{ github.ref_name }}"
          body: |
            ## What's new in ${{ github.ref_name }}

            *(Edit this description after the release is created to tell players what changed.)*

            ### How to install / update
            - **New players:** Download `FuzhouMahjong.zip`, extract it anywhere, and double-click `FuzhouMahjong.exe`.
            - **Existing players:** The launcher will offer the update automatically next time you open it — just click **Update Now**.
          files: FuzhouMahjong.zip
          draft: false
          prerelease: false
